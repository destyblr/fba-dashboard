# Configuration Netlify pour FBA Dashboard

[build]
  command = "echo 'Static site'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions."agent-instruction"]
  timeout = 30

# Agent Catalog — toutes les heures (scrape retailers → raw-products)
[functions."agent-catalog-cron"]
  schedule = "0 * * * *"

# Agent Enricher — toutes les heures, 20min apres le catalog (Keepa EAN → enriched-products)
[functions."agent-enricher-cron"]
  schedule = "20 * * * *"

# Agent Sourcing — toutes les heures (analyse produits enrichis → deals rentables)
[functions."agent-sourcing-cron"]
  schedule = "30 * * * *"

# Agent Inventaire — tous les jours à 8h UTC (alertes délais + ruptures)
[functions."agent-inventory-cron"]
  schedule = "0 8 * * *"

# Team Leader — tous les lundis à 9h UTC
[functions."team-leader-cron"]
  schedule = "0 9 * * 1"

# Redirections pour SPA (Single Page App)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de securite
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache court pour JS/CSS (revalidation a chaque visite)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
