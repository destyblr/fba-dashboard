# Configuration Netlify pour FBA Dashboard

[build]
  command = "echo 'Static site'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Agent Prospection — tous les lundis à 8h UTC
[functions."agent-prospection-cron"]
  schedule = "0 8 * * 1"

# Agent Sourcing — toutes les heures
[functions."agent-sourcing-cron"]
  schedule = "0 * * * *"

# Team Leader — tous les lundis à 9h UTC (après Agent Prospection)
[functions."team-leader-cron"]
  schedule = "0 9 * * 1"

# Redirections pour SPA (Single Page App)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de securite
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache court pour JS/CSS (revalidation a chaque visite)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
